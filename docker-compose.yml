version: "3.9"

services:

  # ── API FastAPI ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .                 # raíz del proyecto
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data         # DB + adjuntos persisten en el host
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"               # reservado para TLS futuro
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Cuando el frontend esté construido, montar el build aquí:
      # - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  # No se declaran volúmenes nombrados — se usan bind mounts al host
  # para que la DB y los adjuntos sean fáciles de hacer backup
